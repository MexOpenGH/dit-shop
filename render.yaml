# Render.com blueprint — deploy with "New > Blueprint" pointing at this repo.
services:
  - type: web
    name: dit-shop
    runtime: node
    plan: starter            # "free" works too, but free has no persistent disk
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true  # Render generates a strong random secret
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DB_PATH
        value: /data/ditshop.sqlite
    disk:
      name: ditshop-data
      mountPath: /data        # SQLite DB persists here across redeploys
      sizeGB: 1
